# ─────────────────────────────────────────────────────────────────────────────
# Graphon Multi-Namespace Demo — Services
#
# Traffic topology (what the demo will reveal in Graphon):
#
#   [demo-web]  frontend → gateway
#   [demo-web → demo-api]  gateway → orders, catalog
#   [demo-api]  orders → payments
#   [demo-api → demo-data] orders → notifications
#   [demo-web → demo-data] gateway → user-service
#
# All pods run nginx:alpine. Ownership labels are set on each pod so
# Graphon auto-discovers team assignments on first ingest.
# ─────────────────────────────────────────────────────────────────────────────

# ════════════════════════════════════════════════════════════════
# NAMESPACE: demo-web  (frontend-team owns this layer)
# ════════════════════════════════════════════════════════════════

apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-stub
  namespace: demo-web
data:
  default.conf: |
    server {
      listen 80;
      location /health { return 200 "ok\n"; }
      location /       { return 200 "stub\n"; }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: demo-web
spec:
  replicas: 1
  selector:
    matchLabels: { app: frontend }
  template:
    metadata:
      labels:
        app: frontend
        app.kubernetes.io/name: frontend
        app.graphon.io/owner-team: frontend-team
        app.graphon.io/owner-email: frontend@demo.io
        app.graphon.io/owner-slack: "#frontend"
        app.graphon.io/service-type: web
    spec:
      containers:
        - name: frontend
          image: nginx:1.27-alpine
          ports: [{ containerPort: 80 }]
          volumeMounts: [{ name: cfg, mountPath: /etc/nginx/conf.d }]
          resources:
            requests: { cpu: 10m, memory: 16Mi }
            limits:   { cpu: 50m, memory: 64Mi }
      volumes: [{ name: cfg, configMap: { name: nginx-stub } }]
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: demo-web
spec:
  selector: { app: frontend }
  ports: [{ port: 80, targetPort: 80 }]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  namespace: demo-web
spec:
  replicas: 1
  selector:
    matchLabels: { app: gateway }
  template:
    metadata:
      labels:
        app: gateway
        app.kubernetes.io/name: gateway
        app.graphon.io/owner-team: platform-team
        app.graphon.io/owner-email: platform@demo.io
        app.graphon.io/owner-slack: "#platform"
        app.graphon.io/service-type: gateway
    spec:
      containers:
        - name: gateway
          image: nginx:1.27-alpine
          ports: [{ containerPort: 80 }]
          volumeMounts: [{ name: cfg, mountPath: /etc/nginx/conf.d }]
          resources:
            requests: { cpu: 10m, memory: 16Mi }
            limits:   { cpu: 50m, memory: 64Mi }
      volumes: [{ name: cfg, configMap: { name: nginx-stub } }]
---
apiVersion: v1
kind: Service
metadata:
  name: gateway
  namespace: demo-web
spec:
  selector: { app: gateway }
  ports: [{ port: 80, targetPort: 80 }]


