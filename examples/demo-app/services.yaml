# ────────────────────────────────────────────────────────────────────────────
# Graphon Demo App — 6 microservices with owner labels
# Each service runs nginx and is labelled so Graphon auto-discovers ownership.
# The traffic-generator pod calls all services in a continuous loop.
# ────────────────────────────────────────────────────────────────────────────

# ── ConfigMap: nginx stub response ──────────────────────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-stub-config
  namespace: graphon-demo
data:
  default.conf: |
    server {
      listen 80;
      location /health { return 200 "ok\n"; }
      location / { return 200 "stub\n"; }
    }

---
# ── frontend ────────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: graphon-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
        app.kubernetes.io/name: frontend
        app.graphon.io/owner-team: "frontend-team"
        app.graphon.io/owner-email: "frontend@example.com"
        app.graphon.io/owner-slack: "#frontend"
    spec:
      containers:
        - name: frontend
          image: nginx:1.27-alpine
          ports:
            - containerPort: 80
          volumeMounts:
            - name: config
              mountPath: /etc/nginx/conf.d
          resources:
            requests: { cpu: 10m, memory: 16Mi }
            limits:   { cpu: 50m, memory: 64Mi }
      volumes:
        - name: config
          configMap:
            name: nginx-stub-config
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: graphon-demo
spec:
  selector:
    app: frontend
  ports:
    - port: 80
      targetPort: 80

