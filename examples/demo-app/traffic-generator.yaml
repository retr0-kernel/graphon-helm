# Traffic Generator — calls all demo services in a loop every 2 seconds.
# This creates the inter-service edges that Graphon captures via eBPF.
# The graphon-agent DaemonSet sees the TCP connections from this pod
# and maps them to the service names via the Kubernetes API.
apiVersion: v1
kind: ConfigMap
metadata:
  name: traffic-script
  namespace: graphon-demo
data:
  run.sh: |
    #!/bin/sh
    set -eu

    # Service topology to simulate:
    # frontend → gateway → orders → payments
    #                    → catalog
    #                    → notifications

    call() {
      wget -q -O /dev/null "http://$1/health" 2>/dev/null || true
    }

    echo "Graphon demo traffic generator started"
    echo "Simulating: frontend → gateway → orders → payments / catalog / notifications"

    while true; do
      # Simulate a user request flowing through the stack
      call frontend
      call gateway
      call orders
      call payments
      call catalog
      call notifications

      # Simulate orders calling payments (real cross-service dep)
      # wget uses TCP so the eBPF kprobe captures it
      call payments
      call payments

      # Simulate gateway fanning out to all backends
      call orders
      call catalog
      call notifications

      sleep 2
    done

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: traffic-generator
  namespace: graphon-demo
  labels:
    app: traffic-generator
spec:
  replicas: 1
  selector:
    matchLabels:
      app: traffic-generator
  template:
    metadata:
      labels:
        app: traffic-generator
        app.graphon.io/owner-team: "platform-team"
        app.graphon.io/owner-email: "platform@example.com"
    spec:
      containers:
        - name: generator
          image: busybox:1.36
          command: ["/bin/sh", "/scripts/run.sh"]
          volumeMounts:
            - name: scripts
              mountPath: /scripts
          resources:
            requests: { cpu: 5m, memory: 8Mi }
            limits:   { cpu: 20m, memory: 32Mi }
      volumes:
        - name: scripts
          configMap:
            name: traffic-script
            defaultMode: 0755
