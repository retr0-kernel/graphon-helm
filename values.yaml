# ────────────────────────────────────────────────────────────────────────────
# Graphon Helm Chart — values.yaml  (DEVELOPER / LOCAL-CLUSTER DEFAULTS)
#
# These defaults are optimised for the first-run experience on small local
# clusters: Kind, Minikube, k3d, Docker Desktop Kubernetes, Killercoda, and
# GitHub Actions (~2 vCPU / 4–8 GB RAM total).
#
# Production deployments should always overlay a production-sized file:
#
#   helm install graphon . -f values-production.yaml
#
# A high-resource example is available in values-large-cluster.yaml.
#
# Full parameter reference:
#   https://github.com/retr0-kernel/graphon/blob/main/graphon-helm/docs/installation.md
# ────────────────────────────────────────────────────────────────────────────

# -- Global image settings shared across all components.
global:
  imageRegistry: ""       # Override to use a private registry: "your-registry.io"
  imagePullSecrets: []    # e.g. ["regcred"]
  storageClass: ""        # Leave empty to use cluster default

# ────────────────────────────────────────────────────────────────────────────
# Backend
# ────────────────────────────────────────────────────────────────────────────
backend:
  enabled: true
  replicaCount: 1

  image:
    registry: ghcr.io
    repository: retr0-kernel/graphon-backend
    tag: "v0.3.1"
    pullPolicy: IfNotPresent

  # AUTH_DISABLED=true  → self-hosted mode: X-Tenant-ID header accepted (no API key needed)
  # AUTH_DISABLED=false → API key required (Graphon Cloud / production mode)
  authDisabled: true

  # Number of days before an OBSERVED dependency edge is promoted to BASELINE
  baselineDays: 7

  # CORS allowed origins — comma-separated or "*"
  corsOrigins: "*"

  # ── Phase 3: Deployment mode ──────────────────────────────────────────────
  # "self-hosted" (default) or "cloud"
  deploymentMode: "self-hosted"

  # ── Phase 3: Licensing ────────────────────────────────────────────────────
  license:
    # License key (JWT issued by license.graphon.io). Leave empty for Free tier.
    key: ""
    # Validate against online revocation list every 24h (requires internet)
    validationEnabled: false
    # Days to continue operating after license expiry before downgrading to Free
    gracePeriodDays: 14
    # Reference an existing secret instead of putting the key inline:
    # existingSecret: "graphon-license"
    # existingSecretKey: "license-key"

  # ── Phase 3: OIDC / SSO (disabled by default) ─────────────────────────────
  oidc:
    enabled: false
    # issuerUrl: "https://accounts.google.com"
    # clientId: ""
    # clientSecret: ""            # use existingSecret in production
    # redirectUrl: "https://graphon.example.com/auth/callback"
    # scopes: "openid,email,profile,groups"
    # groupRoleMapping: "engineering:developer,ops:admin,security:admin"
    # sessionSecret: ""           # 32-char random string; auto-generated if empty
    # existingSecret: "graphon-oidc-secret"

  # ── Phase 3: RBAC (disabled by default) ───────────────────────────────────
  rbac:
    enabled: false
    defaultRole: "viewer"

  # ── Phase 3: GitHub App integration ──────────────────────────────────────
  github:
    enabled: false
    # webhookSecret: ""           # HMAC secret configured in GitHub webhook settings
    # token: ""                   # PAT or GitHub App installation token (repo write scope)
    # existingSecret: ""          # use a pre-existing k8s secret instead

  # ── Phase 3: GitLab App integration ──────────────────────────────────────
  gitlab:
    enabled: false
    instanceUrl: "https://gitlab.com"
    # webhookSecret: ""           # token configured in GitLab webhook settings
    # token: ""                   # GitLab PAT with api scope for posting MR comments
    # existingSecret: ""

  service:
    type: ClusterIP
    port: 8080

  # Dev-sized resources — enough for a 2-node Kind/Minikube cluster.
  # Increase in production: see values-production.yaml
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

  # Probes — generous timeouts for slow local clusters.
  startupProbe:
    httpGet:
      path: /ready
      port: 8080
    initialDelaySeconds: 5
    periodSeconds: 5
    failureThreshold: 24   # 120 s startup budget (Neo4j can be slow first boot)

  readinessProbe:
    httpGet:
      path: /ready
      port: 8080
    initialDelaySeconds: 5
    periodSeconds: 10
    failureThreshold: 6

  livenessProbe:
    httpGet:
      path: /api/v1/health
      port: 8080
    initialDelaySeconds: 60
    periodSeconds: 30
    failureThreshold: 3

  nodeSelector: {}
  tolerations: []
  affinity: {}
  podAnnotations: {}
  podSecurityContext: {}

  # Extra environment variables to inject into the backend pod.
  extraEnv: []
  # - name: LOG_LEVEL
  #   value: debug

# ────────────────────────────────────────────────────────────────────────────
# UI
# ────────────────────────────────────────────────────────────────────────────
ui:
  enabled: true
  replicaCount: 1

  image:
    registry: ghcr.io
    repository: retr0-kernel/graphon-ui
    tag: "v0.3.1"
    pullPolicy: IfNotPresent

  service:
    type: ClusterIP
    port: 80

  # The UI needs to know where to reach the backend.
  # Leave empty to use the in-cluster backend service (http://graphon-backend:8080).
  apiUrl: ""

  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 256Mi

  readinessProbe:
    httpGet:
      path: /
      port: 80
    initialDelaySeconds: 5
    periodSeconds: 10

  livenessProbe:
    httpGet:
      path: /
      port: 80
    initialDelaySeconds: 15
    periodSeconds: 30

  nodeSelector: {}
  tolerations: []
  affinity: {}
  podAnnotations: {}

# ────────────────────────────────────────────────────────────────────────────
# eBPF Agent (DaemonSet)
# Requires Linux kernel ≥ 5.4 and CAP_SYS_ADMIN / privileged.
# Runs in graceful degraded mode (no crash) on environments where eBPF is
# unavailable (Kind without vDSO, GKE Autopilot, AWS Fargate).
# ────────────────────────────────────────────────────────────────────────────
agent:
  enabled: true

  image:
    registry: ghcr.io
    repository: retr0-kernel/graphon-agent
    tag: "v0.3.1"
    pullPolicy: IfNotPresent

  # How often to flush captured events to the backend
  flushInterval: "5s"

  # Your tenant identifier — must be a DNS-safe string
  tenantId: "default"

  # privileged: true is required for eBPF kprobe attachment
  privileged: true

  # Run on all nodes including masters/control-plane
  tolerateAllTaints: true

  # API key for authenticating agent → backend calls.
  # Only required when backend.authDisabled=false.
  # Leave all empty in default self-hosted mode (authDisabled=true).
  apiKey: ""
  existingSecret: ""
  existingSecretKey: "api-key"

  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 256Mi

  nodeSelector: {}
  tolerations: []
  podAnnotations: {}

# ────────────────────────────────────────────────────────────────────────────
# Ingress
# ────────────────────────────────────────────────────────────────────────────
ingress:
  enabled: false
  className: "nginx"

  certManagerIssuer: "letsencrypt-prod"

  hosts:
    ui: "graphon.example.com"
    api: "api.graphon.example.com"

  tls:
    enabled: false
    uiSecretName: "graphon-ui-tls"
    apiSecretName: "graphon-api-tls"

  annotations: {}

# ────────────────────────────────────────────────────────────────────────────
# PostgreSQL — embedded (bitnami/postgresql)
# Set postgresql.enabled=false and provide externalPostgresql to use your own.
# ────────────────────────────────────────────────────────────────────────────
postgresql:
  enabled: true

  auth:
    username: graphon
    database: graphon
    # password: ""        # auto-generated if not set
    # existingSecret: ""

  primary:
    persistence:
      enabled: true
      size: 5Gi           # 5 Gi is plenty for dev; increase to 50+ Gi in production

    # Dev-sized: bitnami postgresql uses standard requests/limits format
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 512Mi

# External PostgreSQL — used when postgresql.enabled=false
externalPostgresql:
  host: ""
  port: 5432
  database: graphon
  username: graphon
  password: ""
  existingSecret: ""
  existingSecretKey: "password"
  sslMode: "require"

# ────────────────────────────────────────────────────────────────────────────
# Neo4j — embedded (neo4j/neo4j)
# Set neo4j.enabled=false and provide externalNeo4j to use your own instance.
#
# IMPORTANT — resource format:
#   The neo4j community helm chart uses a flat resource format where `cpu` and
#   `memory` set BOTH requests and limits to the same value.  Standard k8s
#   requests/limits sub-keys are not supported by this subchart.
#   Path: neo4j.neo4j.resources.{cpu,memory}
# ────────────────────────────────────────────────────────────────────────────
neo4j:
  enabled: true

  neo4j:
    name: graphon
    edition: community
    # Default password is intentionally simple for local dev.
    # CHANGE THIS before any internet-facing deployment.
    password: "graphon-neo4j-password"

    # Dev-sized resources (flat format required by the neo4j community chart).
    # cpu/memory set BOTH the request AND the limit to the same value.
    #
    # ⚠  The neo4j community chart enforces a hard minimum of 2 Gi memory.
    #    This means each Kubernetes node must have ≥ 3 Gi allocatable memory
    #    (≈ 4 GB total RAM after OS/K8s overhead) to schedule this pod.
    #
    #    Kind (Docker Desktop ≥ 8 GB, or --memory=4096):  ✓ fits
    #    Minikube (--memory=4096 or larger):               ✓ fits
    #    GitHub Actions (standard runner, 7 GB RAM):       ✓ fits
    #    Killercoda (2 × 4 GB nodes):                      ✓ fits
    #    2 GB total cluster:                               ✗ use external Neo4j
    #
    #    External Neo4j AuraDB (free tier):
    #      neo4j.enabled=false  +  externalNeo4j.boltUrl=...
    #
    # Production sizing: see values-production.yaml
    resources:
      cpu: "500m"     # default subchart value is "1000m" — halved for dev
      memory: "2Gi"   # hard minimum enforced by the neo4j community chart

  volumes:
    data:
      mode: defaultStorageClass
      defaultStorageClass:
        requests:
          storage: 5Gi  # 5 Gi for dev; increase to 100+ Gi in production

  services:
    neo4j:
      enabled: false   # no external LB — use cluster-internal Bolt only

# External Neo4j — used when neo4j.enabled=false
externalNeo4j:
  boltUrl: ""     # e.g. bolt://neo4j.example.com:7687
  username: neo4j
  password: ""
  existingSecret: ""
  existingSecretKey: "password"

# ────────────────────────────────────────────────────────────────────────────
# Service Account
# ────────────────────────────────────────────────────────────────────────────
serviceAccount:
  create: true
  annotations: {}
  name: ""

# ────────────────────────────────────────────────────────────────────────────
# Network Policy (disabled by default)
# ────────────────────────────────────────────────────────────────────────────
networkPolicy:
  enabled: false
