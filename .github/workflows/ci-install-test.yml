name: Chart Validation (Kind)

# Fast structural validation of the Helm chart — runs in < 5 minutes.
#
# What it tests:
#   • helm lint --strict (two value profiles)
#   • helm template (two value profiles)
#   • helm install --dry-run=server against a real Kind API server
#     (validates that Kubernetes accepts every manifest: RBAC, SA, DaemonSet,
#     Deployment, Secret, Ingress, etc. — without pulling any images)
#
# What it does NOT test (by design):
#   • Image existence on GHCR — that is the release pipeline's job.
#     Checking image existence here causes false failures because the Helm
#     chart is often updated before component images are published.
#   • Database connectivity — needs a separate scheduled workflow.
#
# This workflow is fast enough to be a required PR check.

on:
  pull_request:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "**.md"
  push:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "**.md"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  HELM_VERSION: "3.15.2"
  KIND_VERSION:  "v0.23.0"
  CLUSTER_NAME:  graphon-ci
  RELEASE_NAME:  graphon
  NAMESPACE:     graphon

jobs:
  chart-validate:
    name: Helm chart validation
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Helm ${{ env.HELM_VERSION }}
        uses: azure/setup-helm@v4
        with:
          version: ${{ env.HELM_VERSION }}

      # ── Add repos + fetch dependencies ────────────────────────────────────────
      - name: Add upstream Helm repos
        run: |
          helm repo add bitnami https://charts.bitnami.com/bitnami
          helm repo add neo4j   https://helm.neo4j.com/neo4j
          helm repo update

      - name: Fetch chart dependencies
        run: helm dependency update .

      # ── Lint ──────────────────────────────────────────────────────────────────
      - name: Lint (embedded DBs)
        run: helm lint . --strict

      - name: Lint (external DBs)
        run: |
          helm lint . --strict \
            --set postgresql.enabled=false \
            --set externalPostgresql.host=pg.example.com \
            --set externalPostgresql.password=ci \
            --set neo4j.enabled=false \
            --set externalNeo4j.boltUrl=bolt://neo4j.example.com:7687 \
            --set externalNeo4j.password=ci

      # ── Template render ────────────────────────────────────────────────────────
      - name: Template (embedded DBs)
        run: |
          helm template ${{ env.RELEASE_NAME }} . \
            --set agent.tenantId=ci \
            --debug > /dev/null

      - name: Template (external DBs + ingress + TLS)
        run: |
          helm template ${{ env.RELEASE_NAME }} . \
            --set postgresql.enabled=false \
            --set externalPostgresql.host=pg.example.com \
            --set externalPostgresql.password=ci \
            --set neo4j.enabled=false \
            --set externalNeo4j.boltUrl=bolt://neo4j.example.com:7687 \
            --set externalNeo4j.password=ci \
            --set ingress.enabled=true \
            --set ingress.tls.enabled=true \
            --debug > /dev/null

      # ── Kind cluster (needed for server-side dry-run + manifest apply) ─────────
      - name: Create Kind cluster
        uses: helm/kind-action@v1
        with:
          version:      ${{ env.KIND_VERSION }}
          cluster_name: ${{ env.CLUSTER_NAME }}
          wait:         60s

      # ── Server-side dry-run ────────────────────────────────────────────────────
      # Validates that Kubernetes accepts every manifest (RBAC, SA, Ingress, etc.)
      # without actually creating any pods or pulling any images.
      - name: Dry-run install (server-side validation)
        run: |
          helm install ${{ env.RELEASE_NAME }} . \
            --namespace ${{ env.NAMESPACE }} \
            --create-namespace \
            --dry-run=server \
            --set agent.tenantId=ci \
            --set neo4j.neo4j.password=ci-test-password \
            --set postgresql.enabled=false \
            --set externalPostgresql.host=pg.example.com \
            --set externalPostgresql.password=ci \
            --set neo4j.enabled=false \
            --set externalNeo4j.boltUrl=bolt://neo4j.example.com:7687 \
            --set externalNeo4j.password=ci

      # NOTE: We intentionally do NOT run a real helm install here.
      #
      # Why: values.yaml always reflects the current release tag (e.g. v0.2.7).
      # That image may not yet exist on GHCR when this CI run executes — for
      # example, the Helm chart is updated first, then component images are built.
      # Attempting a real install would cause ImagePullBackOff and false CI
      # failures that have nothing to do with chart correctness.
      #
      # The dry-run=server step above is sufficient: it proves the Kubernetes API
      # server accepts every manifest (RBAC, SA, DaemonSet, Deployment, Secret,
      # Ingress, etc.) without pulling any images. That is the complete
      # responsibility of a chart CI check.
      #
      # Image existence is validated separately: when a component tag is pushed,
      # the component's own release.yml workflow builds and publishes the image,
      # which acts as the image existence gate.

      # ── Diagnostics on failure ─────────────────────────────────────────────────
      - name: Collect diagnostics
        if: failure()
        run: |
          echo "=== kubectl get all ==="
          kubectl -n ${{ env.NAMESPACE }} get all || true

          echo ""
          echo "=== Events ==="
          kubectl -n ${{ env.NAMESPACE }} get events \
            --sort-by='.lastTimestamp' 2>/dev/null | tail -20 || true

          echo ""
          echo "=== Pod descriptions ==="
          kubectl -n ${{ env.NAMESPACE }} describe pods || true

      # ── Cleanup ───────────────────────────────────────────────────────────────
      - name: Destroy Kind cluster
        if: always()
        run: kind delete cluster --name ${{ env.CLUSTER_NAME }}
