name: Chart Validation (Kind)

# Fast structural validation of the Helm chart — runs in < 3 minutes.
#
# What it tests:
#   • helm lint --strict (two value profiles)
#   • helm template (two value profiles)
#   • helm install --dry-run=server against a real Kind API server
#     (validates that Kubernetes accepts every manifest: CRDs, RBAC, etc.)
#   • Actual pod creation with external-DB config (no StatefulSets pulled)
#   • No database startup waits — DB integration tests belong in a separate
#     manual/scheduled workflow where the 10+ min startup is acceptable.
#
# This workflow is fast enough to be a required PR check.

on:
  pull_request:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "**.md"
  push:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "**.md"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  HELM_VERSION: "3.15.2"
  KIND_VERSION:  "v0.23.0"
  CLUSTER_NAME:  graphon-ci
  RELEASE_NAME:  graphon
  NAMESPACE:     graphon

jobs:
  chart-validate:
    name: Helm chart validation
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Helm ${{ env.HELM_VERSION }}
        uses: azure/setup-helm@v4
        with:
          version: ${{ env.HELM_VERSION }}

      # ── Add repos + fetch dependencies ────────────────────────────────────────
      - name: Add upstream Helm repos
        run: |
          helm repo add bitnami https://charts.bitnami.com/bitnami
          helm repo add neo4j   https://helm.neo4j.com/neo4j
          helm repo update

      - name: Fetch chart dependencies
        run: helm dependency update .

      # ── Lint ──────────────────────────────────────────────────────────────────
      - name: Lint (embedded DBs)
        run: helm lint . --strict

      - name: Lint (external DBs)
        run: |
          helm lint . --strict \
            --set postgresql.enabled=false \
            --set externalPostgresql.host=pg.example.com \
            --set externalPostgresql.password=ci \
            --set neo4j.enabled=false \
            --set externalNeo4j.boltUrl=bolt://neo4j.example.com:7687 \
            --set externalNeo4j.password=ci

      # ── Template render ────────────────────────────────────────────────────────
      - name: Template (embedded DBs)
        run: |
          helm template ${{ env.RELEASE_NAME }} . \
            --set agent.tenantId=ci \
            --debug > /dev/null

      - name: Template (external DBs + ingress + TLS)
        run: |
          helm template ${{ env.RELEASE_NAME }} . \
            --set postgresql.enabled=false \
            --set externalPostgresql.host=pg.example.com \
            --set externalPostgresql.password=ci \
            --set neo4j.enabled=false \
            --set externalNeo4j.boltUrl=bolt://neo4j.example.com:7687 \
            --set externalNeo4j.password=ci \
            --set ingress.enabled=true \
            --set ingress.tls.enabled=true \
            --debug > /dev/null

      # ── Kind cluster (needed for server-side dry-run + manifest apply) ─────────
      - name: Create Kind cluster
        uses: helm/kind-action@v1
        with:
          version:      ${{ env.KIND_VERSION }}
          cluster_name: ${{ env.CLUSTER_NAME }}
          wait:         60s

      # ── Server-side dry-run ────────────────────────────────────────────────────
      # Validates that Kubernetes accepts every manifest (RBAC, SA, Ingress, etc.)
      # without actually creating any pods or pulling any images.
      - name: Dry-run install (server-side validation)
        run: |
          helm install ${{ env.RELEASE_NAME }} . \
            --namespace ${{ env.NAMESPACE }} \
            --create-namespace \
            --dry-run=server \
            --set agent.tenantId=ci \
            --set neo4j.neo4j.password=ci-test-password \
            --set postgresql.enabled=false \
            --set externalPostgresql.host=pg.example.com \
            --set externalPostgresql.password=ci \
            --set neo4j.enabled=false \
            --set externalNeo4j.boltUrl=bolt://neo4j.example.com:7687 \
            --set externalNeo4j.password=ci

      # ── Real install (no DBs — no StatefulSets, no long image pulls) ───────────
      # Verifies that Kubernetes actually creates the workload objects (Deployment,
      # DaemonSet, Service, Secret, SA, RBAC). The backend will fail to connect to
      # the fake external DBs, which is expected — we are not testing DB
      # connectivity here, only that the chart manifests are accepted.
      - name: Install (external-DB config, no DB pods)
        run: |
          helm install ${{ env.RELEASE_NAME }} . \
            --namespace ${{ env.NAMESPACE }} \
            --create-namespace \
            --set agent.tenantId=ci \
            --set postgresql.enabled=false \
            --set externalPostgresql.host=graphon-pg-placeholder \
            --set externalPostgresql.password=ci \
            --set neo4j.enabled=false \
            --set externalNeo4j.boltUrl=bolt://graphon-neo4j-placeholder:7687 \
            --set externalNeo4j.password=ci \
            --set agent.enabled=false

      - name: Verify objects were created
        run: |
          echo "=== Deployments ==="
          kubectl -n ${{ env.NAMESPACE }} get deployments

          echo ""
          echo "=== Services ==="
          kubectl -n ${{ env.NAMESPACE }} get services

          echo ""
          echo "=== Secrets ==="
          kubectl -n ${{ env.NAMESPACE }} get secrets

          echo ""
          echo "=== ServiceAccounts ==="
          kubectl -n ${{ env.NAMESPACE }} get serviceaccounts

          # Fail if backend or UI deployment is missing entirely
          kubectl -n ${{ env.NAMESPACE }} get deployment/${{ env.RELEASE_NAME }}-backend
          kubectl -n ${{ env.NAMESPACE }} get deployment/${{ env.RELEASE_NAME }}-ui
          echo "All expected objects exist."

      - name: Check for image pull errors
        run: |
          # Give pods a moment to attempt image pulls
          sleep 20

          PULL_ERRORS=$(kubectl -n ${{ env.NAMESPACE }} get pods --no-headers 2>/dev/null \
            | awk '{print $1, $3}' \
            | grep -E "ErrImagePull|ImagePullBackOff" || true)

          if [[ -n "$PULL_ERRORS" ]]; then
            echo "ERROR: Image pull failures detected (chart references non-existent images):"
            echo "$PULL_ERRORS"
            kubectl -n ${{ env.NAMESPACE }} describe pods || true
            exit 1
          fi
          echo "No image pull errors — all image references are valid."

      # ── Diagnostics on failure ─────────────────────────────────────────────────
      - name: Collect diagnostics
        if: failure()
        run: |
          echo "=== kubectl get all ==="
          kubectl -n ${{ env.NAMESPACE }} get all || true

          echo ""
          echo "=== Events ==="
          kubectl -n ${{ env.NAMESPACE }} get events \
            --sort-by='.lastTimestamp' 2>/dev/null | tail -20 || true

          echo ""
          echo "=== Pod descriptions ==="
          kubectl -n ${{ env.NAMESPACE }} describe pods || true

      # ── Cleanup ───────────────────────────────────────────────────────────────
      - name: Destroy Kind cluster
        if: always()
        run: kind delete cluster --name ${{ env.CLUSTER_NAME }}
