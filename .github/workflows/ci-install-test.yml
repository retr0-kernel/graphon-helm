name: Installation Test (Kind)

# Runs a full Helm install in a real Kind (Kubernetes-in-Docker) cluster.
# Validates that every component starts healthy and helm test passes.
# This workflow is intended to be a required check before merging.

on:
  pull_request:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "**.md"
  push:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "**.md"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  HELM_VERSION: "3.15.2"
  KIND_VERSION:  "v0.23.0"
  CLUSTER_NAME:  graphon-ci
  RELEASE_NAME:  graphon
  NAMESPACE:     graphon

jobs:
  install-test:
    name: Helm install on Kind
    runs-on: ubuntu-latest
    # Budget: ~18 min.
    timeout-minutes: 22

    steps:
      # ── Checkout ──────────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── Tool setup ────────────────────────────────────────────────────────────
      - name: Install Helm ${{ env.HELM_VERSION }}
        uses: azure/setup-helm@v4
        with:
          version: ${{ env.HELM_VERSION }}

      - name: Create Kind cluster
        uses: helm/kind-action@v1
        with:
          version:      ${{ env.KIND_VERSION }}
          cluster_name: ${{ env.CLUSTER_NAME }}
          wait:         120s

      # ── Helm preparation ──────────────────────────────────────────────────────
      - name: Add upstream Helm repos
        run: |
          helm repo add bitnami https://charts.bitnami.com/bitnami
          helm repo add neo4j   https://helm.neo4j.com/neo4j
          helm repo update

      - name: Fetch chart dependencies
        run: helm dependency update .

      - name: Lint chart (strict)
        run: helm lint . --strict

      # ── Install ───────────────────────────────────────────────────────────────
      # Notes:
      #   • Do NOT override image tags here. The chart's default tags (values.yaml)
      #     reference the last stable published release which is guaranteed to exist.
      #     Overriding with "latest" would fail if the latest CI run hasn't published
      #     images yet (chicken-and-egg problem).
      #   • agent.enabled=false: the eBPF agent requires CAP_SYS_ADMIN and kernel
      #     BTF. Kind supports BTF but the agent's kprobe attachment can be flaky in
      #     virtualised environments. The Helm chart structure (DaemonSet, RBAC, SA)
      #     is still exercised through lint + template steps above.
      #   • Do NOT use --wait here. helm --wait polls readiness every 5s and times
      #     out if anything is not Ready — but Neo4j takes 5-7 min in Kind which
      #     exceeds any sensible helm timeout. We do explicit per-component waits
      #     below instead, with generous timeouts for each layer.
      - name: Install Graphon
        run: |
          helm install ${{ env.RELEASE_NAME }} . \
            --namespace ${{ env.NAMESPACE }} \
            --create-namespace \
            --set agent.tenantId=ci-test \
            --set neo4j.neo4j.password=ci-test-password \
            --set agent.enabled=false

      # ── Wait: databases first (they are slowest) ──────────────────────────────
      - name: Wait for PostgreSQL StatefulSet
        run: |
          echo "Waiting for PostgreSQL to become ready (up to 4 min)..."
          kubectl -n ${{ env.NAMESPACE }} rollout status statefulset \
            --selector "app.kubernetes.io/name=postgresql,app.kubernetes.io/instance=${{ env.RELEASE_NAME }}" \
            --timeout=240s || \
          kubectl -n ${{ env.NAMESPACE }} wait pod \
            --selector "app.kubernetes.io/name=postgresql,app.kubernetes.io/instance=${{ env.RELEASE_NAME }}" \
            --for=condition=Ready \
            --timeout=240s

      - name: Wait for Neo4j StatefulSet
        run: |
          echo "Waiting for Neo4j to become ready (up to 8 min — Neo4j needs time to initialise)..."
          kubectl -n ${{ env.NAMESPACE }} wait pod \
            --selector "app.kubernetes.io/name=neo4j,app.kubernetes.io/instance=${{ env.RELEASE_NAME }}" \
            --for=condition=Ready \
            --timeout=480s

      # ── Wait: application layer ───────────────────────────────────────────────
      - name: Wait for backend Deployment
        run: |
          echo "Waiting for backend to become ready (up to 5 min — includes DB retry backoff)..."
          kubectl -n ${{ env.NAMESPACE }} rollout status \
            deployment/${{ env.RELEASE_NAME }}-backend \
            --timeout=300s

      - name: Wait for UI Deployment
        run: |
          kubectl -n ${{ env.NAMESPACE }} rollout status \
            deployment/${{ env.RELEASE_NAME }}-ui \
            --timeout=120s

      # ── Fail-fast: catch CrashLoopBackOff / pull errors ───────────────────────
      - name: Check for failing pods
        run: |
          # Wait a moment for any transient restarts to surface
          sleep 10

          BAD_PODS=$(kubectl -n ${{ env.NAMESPACE }} get pods --no-headers 2>/dev/null \
            | awk '{print $1, $3}' \
            | grep -E "CrashLoopBackOff|ErrImagePull|ImagePullBackOff|CreateContainerConfigError|OOMKilled" \
            || true)

          if [[ -n "$BAD_PODS" ]]; then
            echo "ERROR: Pods in a failing state:"
            echo "$BAD_PODS"
            exit 1
          fi
          echo "All pods are in a healthy state."
          kubectl -n ${{ env.NAMESPACE }} get pods

      # ── helm test ─────────────────────────────────────────────────────────────
      - name: Run helm test
        run: |
          helm test ${{ env.RELEASE_NAME }} \
            --namespace ${{ env.NAMESPACE }} \
            --timeout 3m

      # ── Validate endpoints ────────────────────────────────────────────────────
      - name: Validate backend /api/v1/health
        run: |
          kubectl -n ${{ env.NAMESPACE }} port-forward \
            svc/${{ env.RELEASE_NAME }}-backend 18080:8080 &
          PF_PID=$!
          sleep 3

          RESP=$(curl -sf http://localhost:18080/api/v1/health || echo '{}')
          STATUS=$(echo "$RESP" | jq -r '.status // "error"' 2>/dev/null || echo "error")
          kill "$PF_PID" 2>/dev/null || true

          if [[ "$STATUS" != "ok" ]]; then
            echo "ERROR: /api/v1/health returned status=${STATUS}"
            echo "Response: $RESP"
            exit 1
          fi
          echo "PASS: /api/v1/health → status=ok"

      - name: Validate backend /ready (DB connectivity)
        run: |
          kubectl -n ${{ env.NAMESPACE }} port-forward \
            svc/${{ env.RELEASE_NAME }}-backend 18081:8080 &
          PF_PID=$!
          sleep 3

          RESP=$(curl -sf http://localhost:18081/ready || echo '{}')
          READY=$(echo "$RESP" | jq -r '.ready // false' 2>/dev/null || echo "false")
          kill "$PF_PID" 2>/dev/null || true

          echo "Ready response: $RESP"
          if [[ "$READY" != "true" ]]; then
            echo "ERROR: /ready returned ready=${READY}"
            exit 1
          fi
          echo "PASS: /ready → ready=true (both Neo4j and PostgreSQL reachable)"

      - name: Validate UI is reachable
        run: |
          kubectl -n ${{ env.NAMESPACE }} port-forward \
            svc/${{ env.RELEASE_NAME }}-ui 13000:80 &
          PF_PID=$!
          sleep 3

          HTTP_CODE=$(curl -o /dev/null -sf -w "%{http_code}" \
            http://localhost:13000/ || echo "000")
          kill "$PF_PID" 2>/dev/null || true

          if [[ "$HTTP_CODE" != "200" ]]; then
            echo "ERROR: UI returned HTTP $HTTP_CODE (expected 200)"
            exit 1
          fi
          echo "PASS: UI → HTTP 200"

      # ── Diagnostics on failure ────────────────────────────────────────────────
      - name: Collect diagnostics
        if: failure()
        run: |
          echo "=== kubectl get all ==="
          kubectl -n ${{ env.NAMESPACE }} get all || true

          echo ""
          echo "=== Events (sorted by time) ==="
          kubectl -n ${{ env.NAMESPACE }} get events \
            --sort-by='.lastTimestamp' 2>/dev/null | tail -30 || true

          echo ""
          echo "=== StatefulSets ==="
          kubectl -n ${{ env.NAMESPACE }} get statefulsets -o wide || true

          echo ""
          echo "=== PVCs ==="
          kubectl -n ${{ env.NAMESPACE }} get pvc || true

          echo ""
          echo "=== Pod descriptions ==="
          kubectl -n ${{ env.NAMESPACE }} describe pods || true

          echo ""
          echo "=== Backend logs ==="
          kubectl -n ${{ env.NAMESPACE }} logs \
            -l "app.kubernetes.io/component=backend" \
            --tail=100 --all-containers=true || true

          echo ""
          echo "=== Neo4j logs ==="
          kubectl -n ${{ env.NAMESPACE }} logs \
            -l "app.kubernetes.io/name=neo4j,app.kubernetes.io/instance=${{ env.RELEASE_NAME }}" \
            --tail=60 --all-containers=true || true

          echo ""
          echo "=== PostgreSQL logs ==="
          kubectl -n ${{ env.NAMESPACE }} logs \
            -l "app.kubernetes.io/name=postgresql,app.kubernetes.io/instance=${{ env.RELEASE_NAME }}" \
            --tail=40 --all-containers=true || true

      # ── Cleanup ───────────────────────────────────────────────────────────────
      - name: Destroy Kind cluster
        if: always()
        run: kind delete cluster --name ${{ env.CLUSTER_NAME }}
