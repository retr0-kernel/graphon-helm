{{/*
  ── Embedded Neo4j credentials ──────────────────────────────────────────────
  We create our own Secret with the raw Neo4j password rather than relying on
  the neo4j subchart's Secret format.  The neo4j/neo4j chart stores passwords
  as "NEO4J_AUTH" with value "neo4j/<password>" — that format is useless for
  our backend which needs just the plain password string.

  This Secret is the single source of truth for the NEO4J_PASSWORD env var
  injected into the backend Deployment.
*/}}
{{- if .Values.neo4j.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "graphon.fullname" . }}-neo4j-creds
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "graphon.backend.labels" . | nindent 4 }}
  annotations:
    helm.sh/resource-policy: keep
type: Opaque
stringData:
  password: {{ required "neo4j.neo4j.password is required when neo4j.enabled=true. Set it in values.yaml." .Values.neo4j.neo4j.password | quote }}
---
{{- end }}
{{/*
  ── External PostgreSQL credentials ─────────────────────────────────────────
  Only created when using external PostgreSQL without a pre-existing Secret.
*/}}
{{- if and (not .Values.postgresql.enabled) (not .Values.externalPostgresql.existingSecret) .Values.externalPostgresql.password }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "graphon.fullname" . }}-external-pg
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "graphon.backend.labels" . | nindent 4 }}
type: Opaque
stringData:
  password: {{ .Values.externalPostgresql.password | quote }}
---
{{- end }}
{{/*
  ── External Neo4j credentials ───────────────────────────────────────────────
  Only created when using external Neo4j without a pre-existing Secret.
*/}}
{{- if and (not .Values.neo4j.enabled) (not .Values.externalNeo4j.existingSecret) .Values.externalNeo4j.password }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "graphon.fullname" . }}-external-neo4j
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "graphon.backend.labels" . | nindent 4 }}
type: Opaque
stringData:
  password: {{ .Values.externalNeo4j.password | quote }}
---
{{- end }}
{{/*
  ── Agent API key ────────────────────────────────────────────────────────────
  Created when agent.apiKey is set directly in values and authDisabled=false.
  When using an existing Secret, set agent.existingSecret instead.
*/}}
{{- if and .Values.agent.apiKey (not .Values.agent.existingSecret) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "graphon.fullname" . }}-agent-creds
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "graphon.agent.labels" . | nindent 4 }}
type: Opaque
stringData:
  api-key: {{ .Values.agent.apiKey | quote }}
{{- end }}
{{/*
  ── GitHub integration secrets ───────────────────────────────────────────────
*/}}
{{- if or .Values.backend.github.webhookSecret .Values.backend.github.token }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "graphon.fullname" . }}-github
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "graphon.backend.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- if .Values.backend.github.webhookSecret }}
  webhook-secret: {{ .Values.backend.github.webhookSecret | quote }}
  {{- end }}
  {{- if .Values.backend.github.token }}
  token: {{ .Values.backend.github.token | quote }}
  {{- end }}
{{- end }}
{{/*
  ── GitLab integration secrets ───────────────────────────────────────────────
*/}}
{{- if or .Values.backend.gitlab.webhookSecret .Values.backend.gitlab.token }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "graphon.fullname" . }}-gitlab
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "graphon.backend.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- if .Values.backend.gitlab.webhookSecret }}
  webhook-secret: {{ .Values.backend.gitlab.webhookSecret | quote }}
  {{- end }}
  {{- if .Values.backend.gitlab.token }}
  token: {{ .Values.backend.gitlab.token | quote }}
  {{- end }}
{{- end }}
