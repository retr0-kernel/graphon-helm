{{- if .Values.agent.enabled }}
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: {{ include "graphon.agent.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "graphon.agent.labels" . | nindent 4 }}
spec:
  selector:
    matchLabels:
      {{- include "graphon.agent.selectorLabels" . | nindent 6 }}
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
  template:
    metadata:
      labels:
        {{- include "graphon.agent.selectorLabels" . | nindent 8 }}
      {{- with .Values.agent.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      # eBPF requires access to the host network and process namespace.
      hostNetwork: true
      hostPID: true
      dnsPolicy: ClusterFirstWithHostNet

      serviceAccountName: {{ include "graphon.agent.fullname" . }}

      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}

      # Run on every node — tolerate all taints by default so control-plane
      # nodes are also monitored.
      {{- if .Values.agent.tolerateAllTaints }}
      tolerations:
        - operator: Exists
      {{- else }}
      {{- with .Values.agent.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- end }}

      {{- with .Values.agent.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}

      containers:
        - name: agent
          image: {{ include "graphon.agent.image" . }}
          imagePullPolicy: {{ .Values.agent.image.pullPolicy }}
          securityContext:
            privileged: {{ .Values.agent.privileged }}
            capabilities:
              add:
                - SYS_ADMIN
                - NET_ADMIN
          env:
            - name: BACKEND_URL
              value: {{ printf "http://%s:%d" (include "graphon.backend.fullname" .) (int .Values.backend.service.port) | quote }}
            - name: TENANT_ID
              value: {{ .Values.agent.tenantId | quote }}
            # Each DaemonSet pod uses the node name as the cluster/node identifier
            # so the backend can differentiate events per node.
            - name: CLUSTER_ID
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: FLUSH_INTERVAL
              value: {{ .Values.agent.flushInterval | quote }}
          resources:
            {{- toYaml .Values.agent.resources | nindent 12 }}
          volumeMounts:
            - name: host-proc
              mountPath: /host/proc
              readOnly: true
            - name: host-sys
              mountPath: /host/sys
              readOnly: true
            - name: host-debug
              mountPath: /sys/kernel/debug
              readOnly: false
      volumes:
        - name: host-proc
          hostPath:
            path: /proc
        - name: host-sys
          hostPath:
            path: /sys
        - name: host-debug
          hostPath:
            path: /sys/kernel/debug
{{- end }}
