{{- if .Values.agent.enabled }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "graphon.agent.fullname" . }}
  labels:
    {{- include "graphon.agent.labels" . | nindent 4 }}
rules:
  # Read pods and their metadata for IP → pod/namespace enrichment
  - apiGroups: [""]
    resources: ["pods", "namespaces", "nodes", "services", "endpoints"]
    verbs: ["get", "list", "watch"]
  # Read ReplicaSets and Deployments for owner reference resolution
  - apiGroups: ["apps"]
    resources: ["replicasets", "deployments", "daemonsets", "statefulsets"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "graphon.agent.fullname" . }}
  labels:
    {{- include "graphon.agent.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "graphon.agent.fullname" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "graphon.agent.fullname" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}
