apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "graphon.fullname" . }}-test-connection"
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "graphon.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  restartPolicy: Never
  containers:
    - name: test-health
      image: curlimages/curl:8.7.1
      command:
        - sh
        - -c
        - |
          set -e
          echo "==> Testing backend health..."
          curl -sf http://{{ include "graphon.backend.fullname" . }}:{{ .Values.backend.service.port }}/api/v1/health | grep '"status":"ok"'
          echo "PASS: /api/v1/health"

          echo "==> Testing backend readiness..."
          curl -sf http://{{ include "graphon.backend.fullname" . }}:{{ .Values.backend.service.port }}/ready | grep '"ready":true'
          echo "PASS: /ready"

          echo "==> Testing UI is reachable..."
          curl -sf http://{{ include "graphon.ui.fullname" . }}:{{ .Values.ui.service.port }}/ -o /dev/null
          echo "PASS: UI"

          echo ""
          echo "All Graphon tests passed!"
