# Source: graphon/templates/tests/test-connection.yaml
apiVersion: v1
kind: Pod
metadata:
  name: "graphon-test-connection"
  namespace: default
  labels:
    helm.sh/chart: graphon-0.2.5
    app.kubernetes.io/name: graphon
    app.kubernetes.io/instance: graphon
    app.kubernetes.io/version: "v0.2.5"
    app.kubernetes.io/managed-by: Helm
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  restartPolicy: Never
  containers:
    - name: test-health
      image: curlimages/curl:8.7.1
      command:
        - sh
        - -c
        - |
          set -e
          echo "==> Testing backend health..."
          curl -sf http://graphon-backend:8080/api/v1/health | grep '"status":"ok"'
          echo "PASS: /api/v1/health"

          echo "==> Testing backend readiness..."
          curl -sf http://graphon-backend:8080/ready | grep '"ready":true'
          echo "PASS: /ready"

          echo "==> Testing UI is reachable..."
          curl -sf http://graphon-ui:80/ -o /dev/null
          echo "PASS: UI"

          echo ""
          echo "All Graphon tests passed!"
