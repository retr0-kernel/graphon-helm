# Source: graphon/templates/agent/daemonset.yaml
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: graphon-agent
  namespace: default
  labels:
    helm.sh/chart: graphon-0.2.5
    app.kubernetes.io/name: graphon
    app.kubernetes.io/instance: graphon
    app.kubernetes.io/version: "v0.2.5"
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/component: agent
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: graphon
      app.kubernetes.io/instance: graphon
      app.kubernetes.io/component: agent
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: graphon
        app.kubernetes.io/instance: graphon
        app.kubernetes.io/component: agent
    spec:
      # eBPF requires access to the host network and process namespace.
      hostNetwork: true
      hostPID: true
      dnsPolicy: ClusterFirstWithHostNet

      serviceAccountName: graphon-agent

      # Run on every node — tolerate all taints by default so control-plane
      # nodes are also monitored.
      tolerations:
        - operator: Exists

      containers:
        - name: agent
          image: ghcr.io/retr0-kernel/graphon-agent:v0.2.5
          imagePullPolicy: IfNotPresent
          securityContext:
            privileged: true
            capabilities:
              add:
                - SYS_ADMIN
                - NET_ADMIN
          env:
            - name: BACKEND_URL
              value: "http://graphon-backend:8080"
            - name: TENANT_ID
              value: "default"
            # Each DaemonSet pod uses the node name as the cluster/node identifier
            # so the backend can differentiate events per node.
            - name: CLUSTER_ID
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: FLUSH_INTERVAL
              value: "5s"
            # API key — only injected when configured.
            # Required when backend.authDisabled=false; safe to omit otherwise.
          resources:
            limits:
              cpu: 200m
              memory: 256Mi
            requests:
              cpu: 50m
              memory: 64Mi
          volumeMounts:
            - name: host-proc
              mountPath: /host/proc
              readOnly: true
            - name: host-sys
              mountPath: /host/sys
              readOnly: true
            - name: host-debug
              mountPath: /sys/kernel/debug
              readOnly: false
      volumes:
        - name: host-proc
          hostPath:
            path: /proc
        - name: host-sys
          hostPath:
            path: /sys
        - name: host-debug
          hostPath:
            path: /sys/kernel/debug
---
# Source: graphon/templates/backend/deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: graphon-backend
  namespace: default
  labels:
    helm.sh/chart: graphon-0.2.5
    app.kubernetes.io/name: graphon
    app.kubernetes.io/instance: graphon
    app.kubernetes.io/version: "v0.2.5"
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/component: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: graphon
      app.kubernetes.io/instance: graphon
      app.kubernetes.io/component: backend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: graphon
        app.kubernetes.io/instance: graphon
        app.kubernetes.io/component: backend
    spec:
      serviceAccountName: graphon
      containers:
        - name: backend
          image: ghcr.io/retr0-kernel/graphon-backend:v0.2.5
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: PORT
              value: "8080"
            - name: AUTH_DISABLED
              value: "true"
            - name: BASELINE_DAYS
              value: "7"
            - name: CORS_ORIGINS
              value: "*"

            # ── Neo4j ─────────────────────────────────────────────────────
            - name: NEO4J_URI
              value: "bolt://graphon:7687"
            - name: NEO4J_USER
              value: neo4j
            - name: NEO4J_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: graphon-neo4j-creds
                  key: password

            # ── PostgreSQL (individual vars — backend assembles the DSN) ──
            # Passing individual components instead of a pre-assembled DSN
            # avoids the fragile $(VAR) interpolation trick and decouples
            # secret management from connection string composition.
            - name: POSTGRES_HOST
